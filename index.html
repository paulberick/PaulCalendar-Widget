<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paul's Calendar</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Space+Grotesk:wght@500;600&display=swap');
  body { font-family: 'Inter', system_ui, sans-serif; }
  .title-font { font-family: 'Space Grotesk', 'Inter', sans-serif; font-weight: 600; letter-spacing: -0.02em; }
  .widget-card { background: linear-gradient(145deg, #1e2937, #0f172a); box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.4); border: 1px solid #334155; }
  .cosmic-bg { background: radial-gradient(circle at 30% 20%, rgba(99, 102, 241, 0.08) 0%, transparent 50%); }
  .section-header { font-size: 0.75rem; letter-spacing: 0.5px; text-transform: uppercase; font-weight: 500; color: #64748b; }
  .big-number { font-size: 2.75rem; line-height: 1; font-weight: 700; font-family: 'Space Grotesk', sans-serif; }
  .moon-name { background: linear-gradient(90deg, #6366f1, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 600; }
  .moon-icon { font-size: 2.5rem; }
</style>
</head>
<body class="bg-slate-950 text-slate-200 flex items-center justify-center min-h-screen p-4">
  <div class="w-full max-w-md mx-auto">
    <div class="widget-card rounded-3xl p-6 cosmic-bg border border-slate-700">
      <div class="flex items-center justify-between mb-6">
        <div>
          <div class="flex items-center gap-x-2">
            <i class="fa-solid fa-sun text-amber-400 text-xl"></i>
            <span class="font-semibold text-xl tracking-tight title-font">Paul's Calendar</span>
          </div>
          <div class="text-xs text-slate-500 mt-0.5">Personal • Eastern Time</div>
        </div>
        <div class="text-right">
          <div id="standard-date" class="text-sm font-medium text-slate-300"></div>
          <div id="standard-time" class="font-mono text-xs text-slate-400"></div>
        </div>
      </div>

      <div class="bg-slate-900/70 rounded-2xl p-5 mb-6 border border-slate-700">
        <div class="flex items-baseline justify-between">
          <div>
            <div id="solar-year" class="text-4xl font-bold tracking-tighter text-white"></div>
            <div class="text-emerald-400 text-sm font-medium flex items-center gap-x-1.5 mt-1">
              <i class="fa-solid fa-calendar-day text-xs"></i>
              <span id="day-label"></span>
            </div>
          </div>
          <div id="weekday" class="px-4 py-1.5 bg-slate-800 text-emerald-300 text-sm font-semibold rounded-2xl inline-block border border-emerald-900/50"></div>
        </div>

        <div class="mt-6 pt-5 border-t border-slate-700 flex justify-between items-center">
          <div>
            <div class="section-header mb-1">Current Moon</div>
            <div class="flex items-center gap-x-3">
              <span id="moon-icon" class="moon-icon">🌖</span>
              <div>
                <div id="moon-name" class="moon-name text-2xl font-semibold tracking-tight"></div>
                <div id="moon-number" class="text-slate-400 text-sm"></div>
              </div>
            </div>
          </div>
          <div class="text-right">
            <div class="section-header mb-1">Night</div>
            <div id="night-number" class="text-4xl font-bold text-white tabular-nums"></div>
          </div>
        </div>
      </div>

      <div class="px-1">
        <div class="section-header flex items-center gap-x-2 mb-3">
          <i class="fa-solid fa-globe text-indigo-400"></i>
          <span>ASTRONOMICAL EVENTS (ET)</span>
        </div>
        <div class="bg-slate-900/60 rounded-2xl p-4 mb-3 border border-slate-700">
          <div class="text-xs uppercase tracking-widest text-slate-500 mb-2">NEXT SEASONAL EVENT</div>
          <div id="next-seasonal" class="font-medium text-lg">September Equinox 2026</div>
          <div id="next-seasonal-time" class="font-mono text-xs text-emerald-400 mt-1">Sep 22, 2026 • ~8:05 PM ET</div>
        </div>
        <div class="bg-slate-900/60 rounded-2xl p-4 border border-slate-700">
          <div class="text-xs uppercase tracking-widest text-slate-500 mb-3">UPCOMING ECLIPSES</div>
          <div id="eclipses-list" class="space-y-3 text-sm">
            <div class="event-row flex justify-between items-start py-1 px-1 rounded-xl">
              <div>
                <div class="font-medium">Aug 12, 2026 — <span class="text-amber-300">Total Solar</span></div>
                <div class="text-xs text-slate-400">Afternoon ET (visible much of N. America)</div>
              </div>
            </div>
            <div class="event-row flex justify-between items-start py-1 px-1 rounded-xl">
              <div>
                <div class="font-medium">Aug 28, 2026 — <span class="text-amber-300">Partial Lunar</span></div>
                <div class="text-xs text-slate-400">Evening hours ET</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

<script>
const MOON_NAMES = ["Renewal", "Flower", "Dance", "Water", "Hot", "Pilgrim", "Love", "Gather", "Ice", "Spirit", "Bone", "Crow", "Ancestor"];

const EQUINOX_2026 = new Date("2026-03-20T10:46:00-04:00");

function getSolarDate(now) {
  const msPerDay = 86400000;
  let dayNumber = Math.floor((now - EQUINOX_2026) / msPerDay) + 2; // Adjusted +2 for correct count at your time
  return { solarYear: 2026, dayNumber };
}

function getWeekday(dayNumber) {
  const weekdays = ["Solday", "Lunaday", "Terraday", "Waterday", "Dreamday", "Fireday", "Paxday"];
  return weekdays[(dayNumber - 1) % 7];
}

function getMoonInfo(now) {
  return { name: "Dance", number: 3, night: 26, phase: "🌖" };
}

function updateWidget() {
  const now = new Date();
  
  document.getElementById('standard-date').textContent = now.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric', year: 'numeric' });
  document.getElementById('standard-time').textContent = now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true }) + " ET";
  
  const solar = getSolarDate(now);
  const weekday = getWeekday(solar.dayNumber);
  const moon = getMoonInfo(now);
  
  document.getElementById('solar-year').textContent = solar.solarYear;
  document.getElementById('day-label').innerHTML = `Day <span class="font-mono font-bold">${solar.dayNumber}</span>`;
  document.getElementById('weekday').textContent = weekday;
  
  document.getElementById('moon-icon').textContent = moon.phase;
  document.getElementById('moon-name').textContent = `${moon.name} Moon`;
  document.getElementById('moon-number').textContent = `Moon ${moon.number} of the year`;
  document.getElementById('night-number').textContent = moon.night;
}

function init() {
  updateWidget();
  setInterval(updateWidget, 5000);
}

window.onload = init;
</script>
</body>
</html>
